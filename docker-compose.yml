version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-db
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace_pass
      POSTGRES_DB: marketplace_hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://marketplace:marketplace_pass@postgres:5432/marketplace_hub
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-change-in-production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
